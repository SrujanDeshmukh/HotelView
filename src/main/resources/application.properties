spring.application.name=HotelView

# MongoDB connection (read from environment variable)
spring.data.mongodb.uri=${MONGO_DB_URI}

# JWT secret (read from environment variable)
jwt.secret=${JWT_SECRET}

# Server port
server.port=8080

spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false

spring.profiles.active=dev

# ==========================================
# 1. GZIP COMPRESSION CONFIGURATION (Saves 85% Bandwidth)
# ==========================================
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# ==========================================
# 2. MONGO QUERY LOGGING FOR VERIFICATION
# ==========================================
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG